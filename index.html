<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══ CONFIG ═══ */
const STORAGE_KEY = "bblab-v5";
const ADMIN_PW = "bblab2026";

/* ─── DESIGN TOKENS ─── */
const C = {
  bg:"#06060B",s1:"#0B0A14",s2:"#111020",cd:"#15132B",
  ch:"#1E1A3A",bdr:"rgba(139,92,246,.12)",
  accent:"#8B5CF6",accentBright:"#A78BFA",accentDim:"#6D28D9",
  mint:"#34D399",amber:"#FBBF24",rose:"#FB7185",sky:"#38BDF8",
  txt:"#E8E4F0",txtDim:"#9892A6",txtMute:"#6B6380",
  surface:"#1A1735",white:"#FAF8FF",
  glow:"rgba(139,92,246,.06)",border:"rgba(139,92,246,.1)",
  gradPrimary:"linear-gradient(135deg,#7C3AED,#6D28D9)",
  gradAccent:"linear-gradient(135deg,#8B5CF6,#A78BFA)",
  gradMint:"linear-gradient(135deg,#34D399,#059669)",
};

const ar = v => Array.isArray(v) ? v.join(", ") : (v || "");

/* ─── LOCAL STORAGE HELPER ─── */
const storage = {
  get: (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch(e) { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, val); return true; } catch(e) { return false; } },
};

/* ─── AI CALL (Claude API) ─── */
async function callAI(client) {
  const prompt = `당신은 Brand Beat Lab의 AI 컨설턴트입니다. 소상공인 고객 데이터를 분석해서 브랜딩 랜딩페이지와 업무 자동화를 제안하세요.

사업체: ${client.business} (${ar(client.industry)}) | 타겟: ${client.target}
결과물: ${ar(client.deliverables)} | CTA: ${ar(client.cta)}
필수내용: ${client.must_include} | 자료: ${client.has_assets}
무드: ${ar(client.mood)} | 기능: ${ar(client.features)}
예산: ${client.budget} | 일정: ${client.deadline} | 우선순위: ${ar(client.priority)}
유지보수: ${client.maintenance} | 자동화 관심: ${ar(client.automation_needs)}
추가: ${client.additional}

JSON으로만 답변:
{"summary":"니즈 2~3줄 요약","branding_direction":"브랜딩 방향 제안 (톤, 컬러, 핵심 메시지)","recommended_tier":"추천 티어+이유","estimated_price":"가격 범위(만원)","automation_suggestions":["자동화 제안 3~5개"],"key_points":["제안서 포인트 3~5개"],"landing_page_sections":["추천 랜딩페이지 섹션 구성"],"reply_draft":"카톡용 첫 답변 (200자 이내)"}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
    });
    const data = await res.json();
    const text = data.content?.map(i => i.text || "").join("") || "";
    return JSON.parse(text.replace(/```json|```/g, "").trim());
  } catch(e) {
    // Fallback demo data when API is not available
    return {
      summary: `${client.business}은(는) ${ar(client.industry)} 업종으로, ${client.target} 타겟층을 대상으로 합니다. ${ar(client.deliverables)}을 통해 브랜드 인지도와 운영 효율을 높이고자 합니다.`,
      branding_direction: "업종 특성에 맞는 신뢰감 있는 톤과 따뜻한 색감을 추천합니다. 핵심 메시지는 '전문성'과 '편안함'을 동시에 전달하는 것이 효과적입니다.",
      recommended_tier: "스탠다드 (TIER 2) — 멀티섹션 + 기본 자동화 포함이 가성비 최적",
      estimated_price: "50~70만원",
      automation_suggestions: ["예약 접수 자동화 (카카오톡 연동)", "신규 문의 자동 알림 시스템", "고객 리뷰 자동 수집 및 표시", "매출 일간 리포트 자동 발송"],
      key_points: ["타겟 맞춤형 랜딩페이지로 전환율 극대화", "자동화 시스템으로 운영 시간 50% 절감", "모바일 최적화로 접근성 확보", "카카오톡 연동으로 고객 소통 자동화"],
      landing_page_sections: ["히어로 섹션 (핵심 가치 전달)", "서비스/메뉴 소개", "고객 후기 섹션", "위치 및 연락처", "CTA (예약/문의 버튼)"],
      reply_draft: `안녕하세요 ${client.name}님! Brand Beat Lab입니다. ${client.business} 프로젝트 문의 잘 받았습니다. 맞춤 제안서 준비 중이며, 24시간 내 연락드리겠습니다. 감사합니다!`
    };
  }
}

/* ═══ ATOMS ═══ */
const Tag = ({ t }) => {
  const m = { "필수":[C.rose,"rgba(251,113,133,.12)"], "핵심":[C.amber,"rgba(251,191,36,.12)"], "선택":[C.txtMute,"rgba(107,99,128,.12)"] };
  const [c, b] = m[t] || m["선택"];
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,fontWeight:700,background:b,color:c,letterSpacing:".04em"}}>{t}</span>;
};

const Chip = ({ label, on, onClick }) => (
  <button type="button" onClick={onClick} style={{
    padding:"10px 20px",borderRadius:100,fontSize:13,fontWeight:on?600:400,
    background:on?"rgba(139,92,246,.15)":C.cd,border:`1.5px solid ${on?C.accent:C.border}`,
    color:on?C.accentBright:C.txtDim,cursor:"pointer",transition:"all .25s cubic-bezier(.4,0,.2,1)",
    fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6,
    transform:on?"scale(1.02)":"scale(1)",
  }}>{on && <span style={{fontSize:11}}>✓</span>}{label}</button>
);

const RCard = ({ title, desc, on, onClick }) => (
  <button type="button" onClick={onClick} style={{
    padding:"18px 22px",borderRadius:14,textAlign:"left",width:"100%",fontFamily:"inherit",
    background:on?"rgba(139,92,246,.08)":C.cd,border:`1.5px solid ${on?C.accent:C.border}`,
    cursor:"pointer",transition:"all .25s",display:"flex",alignItems:"flex-start",gap:14,
  }}>
    <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,marginTop:1,border:`2px solid ${on?C.accent:C.border}`,background:on?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
      {on && <div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
    </div>
    <div>
      <div style={{fontSize:14,color:C.txt,fontWeight:500,marginBottom:3}}>{title}</div>
      {desc && <div style={{fontSize:12,color:C.txtMute,fontWeight:300,lineHeight:1.5}}>{desc}</div>}
    </div>
  </button>
);

const Inp = ({ label, tag, hint, ...p }) => (
  <div style={{marginBottom:26}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
      <span style={{fontSize:14,fontWeight:500,color:C.txt}}>{label}</span>{tag&&<Tag t={tag}/>}
    </div>
    {hint&&<div style={{fontSize:12,color:C.txtMute,marginBottom:8,fontWeight:300}}>{hint}</div>}
    <input {...p} style={{width:"100%",padding:"14px 18px",borderRadius:12,background:C.cd,border:`1.5px solid ${C.border}`,color:C.txt,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",transition:"border .2s"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>
);

const Txa = ({ label, tag, hint, ...p }) => (
  <div style={{marginBottom:26}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
      <span style={{fontSize:14,fontWeight:500,color:C.txt}}>{label}</span>{tag&&<Tag t={tag}/>}
    </div>
    {hint&&<div style={{fontSize:12,color:C.txtMute,marginBottom:8,fontWeight:300}}>{hint}</div>}
    <textarea {...p} style={{width:"100%",padding:"14px 18px",borderRadius:12,minHeight:100,background:C.cd,border:`1.5px solid ${C.border}`,color:C.txt,fontSize:14,fontFamily:"inherit",outline:"none",resize:"vertical",lineHeight:1.7,boxSizing:"border-box",transition:"border .2s"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>
);

const CG = ({ label, tag, hint, opts, multi, value, onChange }) => {
  const toggle = v => multi ? onChange(value.includes(v)?value.filter(x=>x!==v):[...value,v]) : onChange(value.includes(v)?[]:[v]);
  return (
    <div style={{marginBottom:26}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}><span style={{fontSize:14,fontWeight:500,color:C.txt}}>{label}</span>{tag&&<Tag t={tag}/>}</div>
      {hint&&<div style={{fontSize:12,color:C.txtMute,marginBottom:10,fontWeight:300}}>{hint}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{opts.map(o=><Chip key={o} label={o} on={value.includes(o)} onClick={()=>toggle(o)}/>)}</div>
    </div>
  );
};

const RG = ({ label, tag, hint, opts, value, onChange }) => (
  <div style={{marginBottom:26}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}><span style={{fontSize:14,fontWeight:500,color:C.txt}}>{label}</span>{tag&&<Tag t={tag}/>}</div>
    {hint&&<div style={{fontSize:12,color:C.txtMute,marginBottom:10,fontWeight:300}}>{hint}</div>}
    <div style={{display:"grid",gap:10}}>{opts.map(o=><RCard key={o.v} title={o.t} desc={o.d} on={value===o.v} onClick={()=>onChange(value===o.v?"":o.v)}/>)}</div>
  </div>
);

const Btn = ({ children, v="primary", disabled, ...p }) => {
  const styles = {
    primary:{background:C.gradPrimary,color:"#fff",border:"none",boxShadow:"0 4px 24px rgba(139,92,246,.25)"},
    mint:{background:C.gradMint,color:"#fff",border:"none"},
    ghost:{background:C.cd,color:C.txtDim,border:`1.5px solid ${C.border}`},
  };
  return <button {...p} disabled={disabled} style={{padding:"16px 28px",borderRadius:12,cursor:disabled?"not-allowed":"pointer",fontSize:14,fontWeight:600,fontFamily:"inherit",transition:"all .25s",flex:1,opacity:disabled?0.5:1,...styles[v],...(p.style||{})}}>{children}</button>;
};

/* ═══ LANDING ═══ */
function Landing({ onStart, onAdmin, onOrder }) {
  const [hoverCard, setHoverCard] = useState(null);
  const [openFaq, setOpenFaq] = useState(null);

  const services = [
    {icon:"🎨",title:"브랜딩 랜딩페이지",desc:"업종 특화 디자인으로 고객 전환율을 극대화하는 맞춤형 웹페이지를 제작합니다.",tag:"웹디자인"},
    {icon:"📋",title:"상세페이지 제작",desc:"스마트스토어, 쿠팡 등 마켓에 최적화된 상세페이지로 구매 전환율을 높입니다.",tag:"커머스"},
    {icon:"⚡",title:"업무 자동화 시스템",desc:"예약·주문·알림·정산 등 반복 업무를 자동화하여 운영 효율을 극대화합니다.",tag:"자동화"},
    {icon:"🤖",title:"AI 컨설팅 분석",desc:"AI가 업장을 분석하여 브랜딩 전략과 자동화 방안을 즉시 제안합니다.",tag:"AI"},
  ];

  const process = [
    {num:"01",title:"설문 작성",desc:"5분이면 충분합니다. 사업에 대한 핵심 정보만 알려주세요.",color:C.accent},
    {num:"02",title:"AI 분석",desc:"AI가 즉시 업장을 분석하고 브랜딩 전략과 자동화 방안을 도출합니다.",color:C.sky},
    {num:"03",title:"맞춤 제안서",desc:"24시간 내 최적화된 솔루션이 담긴 맞춤 제안서를 보내드립니다.",color:C.mint},
    {num:"04",title:"제작 & 납품",desc:"3~10일 이내 완성. 수정사항 반영 후 최종 납품됩니다.",color:C.amber},
  ];

  const faqs = [
    {q:"제작 기간은 얼마나 걸리나요?",a:"프로젝트 범위에 따라 3~10일이 소요됩니다. 심플 원페이지는 3~5일, 멀티페이지 웹사이트는 7~10일, 웹앱·자동화 시스템은 2~3주 정도 소요됩니다."},
    {q:"자동화 시스템이란 무엇인가요?",a:"예약 자동 접수, 카카오톡 자동 알림, 주문 정리, 정산 자동화 등 사장님이 매일 반복하는 업무를 시스템으로 자동 처리합니다. 초기 세팅 후 매달 관리비로 운영됩니다."},
    {q:"수정은 몇 번 가능한가요?",a:"티어별로 1~3회 수정이 포함되어 있습니다. 추가 수정이 필요하면 건당 비용으로 진행 가능합니다."},
    {q:"유지보수는 어떻게 하나요?",a:"월 정기 관리(월 5~15만원) 또는 건별 요청 중 선택하실 수 있습니다. 정기 관리에는 콘텐츠 업데이트, 모니터링, 소소한 수정이 포함됩니다."},
  ];

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* NAV */}
      <nav style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 24px",maxWidth:1200,margin:"0 auto",width:"100%",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:C.gradAccent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#fff",letterSpacing:"-0.02em"}}>BB</div>
          <div>
            <div style={{fontSize:15,color:C.white,fontWeight:700,letterSpacing:"-0.02em"}}>Brand Beat Lab</div>
            <div style={{fontSize:9,color:C.txtMute,letterSpacing:".15em",textTransform:"uppercase"}}>소상공인 브랜딩 & 자동화</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          <button onClick={onAdmin} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.txtDim,cursor:"pointer",fontSize:10,fontFamily:"inherit",whiteSpace:"nowrap"}}>관리자</button>
          <button onClick={onStart} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.accentBright,cursor:"pointer",fontSize:10,fontWeight:500,fontFamily:"inherit",whiteSpace:"nowrap"}}>무료 상담</button>
          <button onClick={onOrder} style={{padding:"7px 12px",borderRadius:8,border:"none",background:C.gradMint,color:"#fff",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>바로 시작 →</button>
        </div>
      </nav>

      {/* HERO */}
      <div style={{position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-200,left:"50%",transform:"translateX(-50%)",width:800,height:800,borderRadius:"50%",background:"radial-gradient(circle, rgba(139,92,246,.08) 0%, transparent 70%)",pointerEvents:"none"}}/>

      <Txa label="추가 요청사항" tag="선택" value={f.additional} onChange={e=>s("additional",e.target.value)} placeholder="기타 요청사항이 있으시면 자유롭게 작성해주세요"/>
    </>),
  ];

  const submit = () => onSubmit({...f, submitted_at:new Date().toISOString(), id:Date.now().toString(36)+Math.random().toString(36).slice(2,6), status:"new"});

  const secInfo = [
    {t:"SECTION A",n:"기본 비즈니스 정보",d:"사업에 대해 알려주세요. AI가 업장을 분석합니다."},
    {t:"SECTION B",n:"프로젝트 요구사항",d:"원하는 결과물과 목적을 알려주세요."},
    {t:"SECTION C",n:"디자인 & 기능",d:"브랜드 분위기와 필요한 기능을 선택하세요."},
    {t:"SECTION D",n:"자동화 & 예산",d:"업무 자동화 니즈와 예산 범위를 알려주세요."},
  ];

  return (
    <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.accentBright,cursor:"pointer",fontSize:13,fontFamily:"inherit",padding:"18px 0 0",display:"flex",alignItems:"center",gap:6}}>← 메인으로</button>
      <div style={{position:"sticky",top:0,zIndex:100,padding:"16px 0",background:"rgba(6,6,11,.92)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{height:4,borderRadius:4,background:"rgba(139,92,246,.08)",overflow:"hidden",marginBottom:12}}>
          <div style={{height:"100%",borderRadius:4,width:`${pct}%`,background:C.gradAccent,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>{STEPS.map((st,i)=>(
          <span key={st} style={{fontSize:11,fontWeight:i===step?600:400,color:i===step?C.accentBright:i<step?C.mint:C.txtMute,cursor:i<=step?"pointer":"default",transition:"color .2s"}} onClick={()=>i<=step&&setStep(i)}>{st}</span>
        ))}</div>
      </div>
      <div style={{margin:"30px 0 28px"}}>
        <div style={{fontSize:11,letterSpacing:".2em",color:C.accent,fontWeight:700,marginBottom:8}}>{secInfo[step].t}</div>
        <h2 style={{fontSize:22,color:C.white,fontWeight:700,marginBottom:6,letterSpacing:"-0.02em"}}>{secInfo[step].n}</h2>
        <p style={{fontSize:13,color:C.txtDim,fontWeight:400}}>{secInfo[step].d}</p>
      </div>
      <div key={step} style={{animation:"fadeUp .35s ease both"}}>{steps[step]()}</div>
      <div style={{display:"flex",gap:12,margin:"40px 0 70px"}}>
        {step>0&&<Btn v="ghost" onClick={()=>setStep(step-1)}>← 이전</Btn>}
        {step<3
          ?<Btn onClick={()=>setStep(step+1)} disabled={!canNext()}>다음 →</Btn>
          :<Btn v="mint" onClick={submit} disabled={!f.deadline}>제출하기 ✓</Btn>}
      </div>
    </div>
  );
}

function Admin({ clients, setClients, onBack }) {
  const [sel, setSel] = useState(null);
  const [ai, setAi] = useState({});
  const [loading, setLoading] = useState(null);
  const [copied, setCopied] = useState(false);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [notes, setNotes] = useState({});
  const [tab, setTab] = useState("overview");

  const sC = {new:C.mint,contacted:C.amber,closed:C.accentBright,rejected:C.rose};
  const sL = {new:"신규",contacted:"상담중",closed:"완료",rejected:"미진행"};

  const save = async u => { setClients(u); storage.set(STORAGE_KEY, JSON.stringify(u)); };
  const updSt = (id,st) => save(clients.map(c=>c.id===id?{...c,status:st}:c));
  const del = id => { save(clients.filter(c=>c.id!==id)); setSel(null); };
  const addNote = (id, note) => setNotes(p=>({...p,[id]:[...(p[id]||[]),{text:note,time:new Date().toISOString()}]}));

  const analyze = async c => {
    if(ai[c.id])return;
    setLoading(c.id);
    try { const result = await callAI(c); setAi(p=>({...p,[c.id]:result})); }
    catch(e){ setAi(p=>({...p,[c.id]:{summary:"분석 실패",branding_direction:"-",recommended_tier:"-",estimated_price:"-",automation_suggestions:["수동 확인"],key_points:["수동 확인"],landing_page_sections:["-"],reply_draft:"자동 생성 실패"}})); }
    setLoading(null);
  };

  const filtered = clients.filter(c => {
    if(filter!=="all" && c.status!==filter) return false;
    if(search && !c.business?.toLowerCase().includes(search.toLowerCase()) && !c.name?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const stats = {
    total:clients.length,
    new:clients.filter(c=>c.status==="new").length,
    contacted:clients.filter(c=>c.status==="contacted").length,
    closed:clients.filter(c=>c.status==="closed").length,
    rejected:clients.filter(c=>c.status==="rejected").length,
  };

  const c = sel ? clients.find(x=>x.id===sel) : null;
  const a = sel ? ai[sel] : null;

  // Detail view
  if(c) {
    return (
      <div style={{maxWidth:800,margin:"0 auto",padding:"0 20px 70px",animation:"fadeUp .35s ease both"}}>
        <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.accentBright,cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:24,padding:0,display:"flex",alignItems:"center",gap:6}}>← 목록으로</button>

        {/* Header */}
        <div style={{padding:28,borderRadius:18,background:C.cd,border:`1.5px solid ${C.border}`,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:14}}>
            <div>
              <h2 style={{fontSize:22,color:C.white,fontWeight:800,marginBottom:6,letterSpacing:"-0.02em"}}>{c.business}</h2>
              <p style={{fontSize:13,color:C.txtDim}}>{c.name} · {c.phone} · {c.contact}</p>
              <p style={{fontSize:12,color:C.txtMute,marginTop:4}}>{new Date(c.submitted_at).toLocaleString("ko-KR")} 접수</p>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(sL).map(([k,v])=>(
                <button key={k} onClick={()=>updSt(c.id,k)} style={{padding:"7px 16px",borderRadius:100,fontSize:11,fontWeight:600,cursor:"pointer",background:c.status===k?`${sC[k]}18`:C.s1,border:`1.5px solid ${c.status===k?sC[k]:C.border}`,color:c.status===k?sC[k]:C.txtMute,fontFamily:"inherit",transition:"all .2s"}}>{v}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginBottom:16,background:C.s1,borderRadius:12,padding:4}}>
          {[["overview","AI 분석"],["data","전체 데이터"],["notes","메모"]].map(([k,v])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:tab===k?C.cd:"transparent",color:tab===k?C.accentBright:C.txtMute,fontSize:13,fontWeight:tab===k?600:400,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>{v}</button>

function FileUploadArea({ files, onChange }) {
  const inputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);

  const addFiles = (newFiles) => {
    const arr = Array.from(newFiles).map(f => ({
      name: f.name,
      size: f.size,
      type: f.type,
      preview: f.type.startsWith("image/") ? URL.createObjectURL(f) : null,
      isVideo: f.type.startsWith("video/"),
    }));
    onChange([...files, ...arr]);
  };

  return (
    <div style={{marginBottom:26}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
        <span style={{fontSize:14,fontWeight:500,color:C.txt}}>사진 · 영상 · 로고 첨부</span><Tag t="핵심"/>
      </div>
      <div style={{fontSize:12,color:C.txtMute,marginBottom:10,fontWeight:300}}>로고, 대표 사진, 메뉴 사진, 영상, 참고 이미지 등을 올려주세요. 여러 파일 동시 선택 가능합니다.</div>
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);addFiles(e.dataTransfer.files);}}
        onClick={()=>inputRef.current?.click()}
        style={{
          padding:"40px 20px",borderRadius:16,
          border:`2px dashed ${dragOver?C.accent:C.border}`,
          background:dragOver?"rgba(139,92,246,.06)":C.cd,
          textAlign:"center",cursor:"pointer",transition:"all .2s",
        }}
      >
        <input ref={inputRef} type="file" multiple accept="image/*,video/*,.pdf,.ai,.psd,.eps,.svg" style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>
        <div style={{fontSize:32,marginBottom:12}}>{dragOver?"📂":"📁"}</div>
        <p style={{fontSize:13,color:C.accentBright,fontWeight:600,marginBottom:6}}>클릭 또는 드래그하여 파일 업로드</p>
        <p style={{fontSize:11,color:C.txtMute}}>이미지(JPG, PNG, WEBP) · 영상(MP4, MOV) · 디자인(AI, PSD, PDF)</p>
      </div>
      {files.length>0&&(
        <div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:10}}>
          {files.map((f,i)=>(
            <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",background:C.s1,border:`1px solid ${C.border}`}}>
              {f.preview ? (
                <img src={f.preview} alt={f.name} style={{width:"100%",height:80,objectFit:"cover",display:"block"}}/>
              ) : (
                <div style={{width:"100%",height:80,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
                  {f.isVideo?"🎬":"📄"}
                </div>
              )}
              <div style={{padding:"4px 6px"}}>
                <p style={{fontSize:9,color:C.txtDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</p>
              </div>
              <button onClick={e=>{e.stopPropagation();onChange(files.filter((_,j)=>j!==i));}} style={{position:"absolute",top:4,right:4,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,.7)",border:"none",color:"#fff",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

      {/* Progress */}
      <div style={{position:"sticky",top:0,zIndex:100,padding:"16px 0",background:"rgba(6,6,11,.92)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{height:4,borderRadius:4,background:"rgba(52,211,153,.08)",overflow:"hidden",marginBottom:12}}>
          <div style={{height:"100%",borderRadius:4,width:`${pct}%`,background:C.gradMint,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>{ORDER_STEPS.map((st,i)=>(
          <span key={st} style={{fontSize:11,fontWeight:i===step?600:400,color:i===step?C.mint:i<step?C.accentBright:C.txtMute,cursor:i<=step?"pointer":"default",transition:"color .2s"}} onClick={()=>i<=step&&setStep(i)}>{st}</span>
        ))}</div>
      </div>

      {/* Section header */}
      <div style={{margin:"30px 0 28px"}}>
        <div style={{fontSize:11,letterSpacing:".2em",color:C.mint,fontWeight:700,marginBottom:8}}>{secInfo[step].t}</div>
        <h2 style={{fontSize:22,color:C.white,fontWeight:700,marginBottom:6,letterSpacing:"-0.02em"}}>{secInfo[step].n}</h2>
        <p style={{fontSize:13,color:C.txtDim,fontWeight:400}}>{secInfo[step].d}</p>
      </div>

      {/* Fields */}
      <div key={step} style={{animation:"fadeUp .35s ease both"}}>{steps[step]()}</div>

      {/* Navigation */}
      <div style={{display:"flex",gap:12,margin:"40px 0 70px"}}>
        {step>0&&<Btn v="ghost" onClick={()=>setStep(step-1)}>← 이전</Btn>}
        {step<3
          ?<Btn v="mint" onClick={()=>setStep(step+1)} disabled={!canNext()} style={{background:C.gradMint}}>다음 →</Btn>
          :<Btn v="mint" onClick={submit} disabled={!canNext()} style={{background:C.gradMint,boxShadow:"0 4px 24px rgba(52,211,153,.25)"}}>💳 계약금 결제 & 제작 시작</Btn>}
      </div>
    </div>
  );
}

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setPg("landing")} style={{flex:1,padding:14,borderRadius:12,border:`1.5px solid ${C.border}`,background:"transparent",color:C.txtDim,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>취소</button>
              <button onClick={tryPw} style={{flex:1,padding:14,borderRadius:12,border:"none",background:C.gradPrimary,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>확인</button>
            </div>
          </div>
        </div>
      )}

      {/* Footer */}
      <footer style={{textAlign:"center",padding:"36px 0 52px",borderTop:`1px solid ${C.border}`}}>
        <p style={{fontSize:12,color:C.txtMute}}>Brand Beat Lab · 소상공인 브랜딩 & 자동화 플랫폼</p>
        <p style={{fontSize:11,color:C.txtMute,marginTop:5,opacity:0.6}}>Powered by Ian Ko × AI</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
